<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid Glass Store</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0e12;
            --text-main: #f5f5f7;
            --text-muted: #5c626c;
            --glass-tint: rgba(140, 155, 175, 0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; padding-bottom: 110px; }
        
        .liquid-panel { 
            background: rgba(25, 28, 36, 0.45);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-right: 1px solid rgba(0, 0, 0, 0.25);
            border-bottom: 1px solid rgba(0, 0, 0, 0.35);
            box-shadow: inset 1px 1px 2px rgba(255, 255, 255, 0.1), inset -2px -2px 4px rgba(0, 0, 0, 0.4), 4px 6px 15px rgba(0, 0, 0, 0.35);
        }
        header { position: sticky; top: 0; z-index: 100; padding: 14px 24px; background: rgba(13, 14, 18, 0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; justify-content: flex-end; }
        .ios-status-dot { width: 8px; height: 8px; background: #30d158; border-radius: 50%; box-shadow: 0 0 10px rgba(48, 209, 88, 0.6); }
        .categories-container { display: flex; gap: 12px; overflow-x: auto; padding: 12px 20px; scrollbar-width: none; }
        .categories-container::-webkit-scrollbar { display: none; }
        .category-pill { padding: 10px 20px; border-radius: 16px; background: rgba(30, 35, 45, 0.3); border-top: 1px solid rgba(255,255,255,0.06); border-left: 1px solid rgba(255,255,255,0.04); border-bottom: 1px solid rgba(0,0,0,0.2); color: var(--text-muted); font-size: 14px; font-weight: 600; white-space: nowrap; cursor: pointer; box-shadow: inset 1px 1px 1px rgba(255,255,255,0.05), 2px 3px 6px rgba(0,0,0,0.15); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .category-pill.active { background: rgba(255, 255, 255, 0.08); color: var(--text-main); border-top: 1px solid rgba(255,255,255,0.18); border-left: 1px solid rgba(255,255,255,0.1); box-shadow: inset -1px -1px 3px rgba(255,255,255,0.05), inset 2px 2px 5px rgba(0,0,0,0.4); }
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 12px 20px 24px 20px; }
        .product-card { padding: 18px; display: flex; flex-direction: column; justify-content: space-between; height: 165px; transition: transform 0.2s ease; }
        .product-card:active { transform: scale(0.96); }
        .product-name { font-size: 15px; font-weight: 600; color: var(--text-main); line-height: 1.35; letter-spacing: -0.2px; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; }
        .product-price { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.85); text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .add-btn { width: 38px; height: 38px; border-radius: 14px; background: rgba(255, 255, 255, 0.04); border-top: 1px solid rgba(255, 255, 255, 0.2); border-left: 1px solid rgba(255, 255, 255, 0.15); border-right: 1px solid rgba(0, 0, 0, 0.2); border-bottom: 1px solid rgba(0, 0, 0, 0.3); color: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.15), 2px 3px 6px rgba(0,0,0,0.25); transition: all 0.15s ease; }
        .add-btn:active { box-shadow: inset -1px -1px 2px rgba(255,255,255,0.1), inset 2px 2px 4px rgba(0,0,0,0.4); transform: scale(0.92); }
        .tab-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 82px; display: flex; justify-content: space-around; align-items: center; padding-bottom: 4px; z-index: 200; border-radius: 32px; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.08), 0 15px 35px rgba(0,0,0,0.6); }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 11px; font-weight: 500; cursor: pointer; position: relative; width: 62px; height: 62px; justify-content: center; border-radius: 18px; transition: all 0.2s; }
        .tab-item.active { color: var(--text-main); background: rgba(0, 0, 0, 0.15); border-bottom: 1px solid rgba(255,255,255,0.04); border-right: 1px solid rgba(255,255,255,0.02); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.45), inset -1px -1px 2px rgba(255,255,255,0.03); }
        .tab-item .material-icons-round { font-size: 26px; margin-bottom: 2px; }
        .badge { position: absolute; top: 6px; right: 6px; background: #ff453a; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 700; box-shadow: 0 2px 6px rgba(255,69,58,0.4); }
        .app-screen { display: none; padding: 16px 4px; }
        .app-screen.active { display: block; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; margin-bottom: 14px; }
        .cart-controls { display: flex; align-items: center; gap: 14px; }
        .cart-qty-btn { width: 34px; height: 34px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); color: var(--text-main); display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: inset 1px 1px 1px rgba(255,255,255,0.05), 1px 2px 4px rgba(0,0,0,0.2); }
        .cart-qty-btn:active { box-shadow: inset 1px 1px 3px rgba(0,0,0,0.4); }
        .form-group { margin-top: 18px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; padding-left: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
        .input-field { width: 100%; padding: 18px; background: rgba(15, 17, 23, 0.4); border-bottom: 1px solid rgba(255,255,255,0.06); border-right: 1px solid rgba(255,255,255,0.03); border-top: 1px solid rgba(0,0,0,0.3); border-left: 1px solid rgba(0,0,0,0.4); border-radius: 18px; color: var(--text-main); font-size: 15px; outline: none; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); }
        .checkout-btn { width: 100%; padding: 18px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: var(--text-main); border-top: 1px solid rgba(255,255,255,0.3); border-left: 1px solid rgba(255,255,255,0.2); border-right: 1px solid rgba(0,0,0,0.3); border-bottom: 1px solid rgba(0,0,0,0.5); border-radius: 18px; font-size: 16px; font-weight: 700; margin-top: 28px; cursor: pointer; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.2), 0 8px 20px rgba(0,0,0,0.4); transition: all 0.15s ease; }
        .checkout-btn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.6); transform: scale(0.98); }
        .bottom-sheet-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .bottom-sheet-backdrop.open { opacity: 1; pointer-events: auto; }
        .bottom-sheet { position: fixed; left: 10px; right: 10px; bottom: 12px; max-height: 65vh; background: rgba(23, 26, 33, 0.85); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border-radius: 32px; z-index: 1001; transform: translateY(110%); transition: transform 0.38s cubic-bezier(0.2, 1, 0.2, 1); display: flex; flex-direction: column; border-top: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.08); box-shadow: 0 15px 40px rgba(0,0,0,0.7); }
        .bottom-sheet.open { transform: translateY(0); }
        .bottom-sheet-handle { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; margin: 12px auto; flex-shrink: 0; box-shadow: inset 1px 1px 1px rgba(0,0,0,0.3); }
        .bottom-sheet-content { overflow-y: auto; padding: 0 24px 30px 24px; }
        .district-item { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 16px; cursor: pointer; color: var(--text-main); transition: padding-left 0.2s; }
        .district-item:active { padding-left: 28px; color: rgba(255,255,255,0.6); }
        #loader { text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>
    <header><div class="ios-status-dot"></div></header>
    <main id="catalog-screen" class="app-screen active">
        <div class="categories-container" id="categories-list"><div class="category-pill active" onclick="filterCategory('all')">Все</div></div>
        <div id="loader">Формирование стеклянных виджетов...</div>
        <div class="catalog-grid" id="products-container"></div>
    </main>
    <main id="cart-screen" class="app-screen">
        <div style="padding: 0 16px;"><h2 style="margin-bottom: 24px; font-weight: 700; font-size: 24px; letter-spacing: -0.5px;">Выбранное</h2></div>
        <div id="cart-items-container"></div>
        <div id="cart-form-block" style="display: none; padding: 0 16px; margin-top: 20px;">
            <div class="form-group">
                <label>Локация доставки</label>
                <div class="input-field" id="district-selector" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
                    <span id="selected-district-text" style="color:var(--text-muted);">Выбрать район Сморгони...</span>
                    <span class="material-icons-round" style="font-size:22px; color:rgba(255,255,255,0.4);">expand_more</span>
                </div>
            </div>
            <div class="form-group">
                <label>Адрес и контакт</label>
                <input type="text" id="user-address" class="input-field" placeholder="Улица, дом, кв, телефон...">
            </div>
            <div style="margin-top: 32px; display:flex; justify-content:space-between; font-weight:700; font-size:20px; padding: 0 4px;">
                <span style="color: var(--text-muted); font-weight:500;">Сумма:</span>
                <span id="cart-total-price">0 Br</span>
            </div>
            <button class="checkout-btn" onclick="sendOrder()">Отправить заказ</button>
        </div>
    </main>
    <main id="profile-screen" class="app-screen">
        <div class="liquid-panel" style="padding: 24px; text-align: center; margin: 0 16px 20px 16px;">
            <div style="width: 64px; height: 64px; border-radius: 20px; background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.1); border-left: 1px solid rgba(255,255,255,0.05); margin: 0 auto 16px auto; display:flex; align-items:center; justify-content:center; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.1), 2px 4px 10px rgba(0,0,0,0.3);"><span class="material-icons-round" style="font-size: 32px; color: rgba(255,255,255,0.7);">blur_on</span></div>
            <h3 id="profile-name" style="font-size: 18px; font-weight: 700; letter-spacing: -0.3px;">Пользователь устройства</h3>
            <p style="color: var(--text-muted); font-size: 13px; margin-top: 4px; font-weight: 500;">Статус: Client</p>
        </div>
        <div class="liquid-panel" style="padding: 16px; margin: 0 16px;">
            <div style="display:flex; justify-content:space-between; padding: 14px 6px; border-bottom: 1px solid rgba(255,255,255,0.03);"><span style="color:var(--text-muted); font-size: 14px; font-weight: 500;">Региональная валюта</span><strong style="font-size: 14px; font-weight: 600;">Белорусский рубль (Br)</strong></div>
            <div style="display:flex; justify-content:space-between; padding: 14px 6px;"><span style="color:var(--text-muted); font-size: 14px; font-weight: 500;">Система бэкенда</span><strong style="color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 600;">Google Cloud Sheets</strong></div>
        </div>
    </main>
    <nav class="tab-bar liquid-panel">
        <div id="tab-btn-catalog" class="tab-item active" onclick="switchTab('catalog')"><span class="material-icons-round">widgets</span><span style="font-size:10px; margin-top:3px; font-weight: 600;">Обзор</span></div>
        <div id="tab-btn-cart" class="tab-item" onclick="switchTab('cart')"><span class="material-icons-round">local_mall</span><span style="font-size:10px; margin-top:3px; font-weight: 600;">Корзина</span><span class="badge" id="cart-badge" style="display: none;">0</span></div>
        <div id="tab-btn-profile" class="tab-item" onclick="switchTab('profile')"><span class="material-icons-round">tune</span><span style="font-size:10px; margin-top:3px; font-weight: 600;">Настройки</span></div>
    </nav>
    <div class="bottom-sheet-backdrop" id="sheet-backdrop" onclick="closeDistrictSheet()"></div>
    <div class="bottom-sheet" id="district-sheet">
        <div class="bottom-sheet-handle"></div>
        <div style="padding: 12px 24px; font-weight:700; font-size:18px; color: var(--text-main); letter-spacing: -0.3px;">Локации (Сморгонь)</div>
        <div class="bottom-sheet-content" id="districts-list-container"></div>
    </div>
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            if (tg.initDataUnsafe?.user?.first_name) {
                document.getElementById('profile-name').innerText = tg.initDataUnsafe.user.first_name;
            }
        }
        const SHEET_ID = '1XGPNRIox_1zfFrrk-Cdkh1IJo2Z27oQIzVe28Gx-dZM';
        const SHEET_URL = `https://google.com{SHEET_ID}/gviz/tq?sheet=Products&tqx=out:json`;
        const districts = ["Центр", "Досы", "Восточный"];
        let productsData = []; let cart = {}; let currentCategory = 'all';
        const dContainer = document.getElementById('districts-list-container');
        districts.forEach(d => {
            const div = document.createElement('div'); div.className = 'district-item'; div.innerText = d;
            div.onclick = () => selectDistrict(d); dContainer.appendChild(div);
        });
        document.getElementById('district-selector').onclick = () => {
            document.getElementById('sheet-backdrop').classList.add('open');
            document.getElementById('district-sheet').classList.add('open');
        };
        function closeDistrictSheet() {
            document.getElementById('sheet-backdrop').classList.remove('open');
            document.getElementById('district-sheet').classList.remove('open');
        }
        function selectDistrict(name) {
            document.getElementById('selected-district-text').innerText = name;
            document.getElementById('selected-district-text').style.color = 'var(--text-main)';
            closeDistrictSheet();
        }
        function switchTab(tabName) {
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.app-screen').forEach(el => el.classList.remove('active'));
            if (tabName === 'catalog') {
                document.getElementById('tab-btn-catalog').classList.add('active');
                document.getElementById('catalog-screen').classList.add('active');
            } else if (tabName === 'cart') {
                document.getElementById('tab-btn-cart').classList.add('active');
                document.getElementById('cart-screen').classList.add('active');
                renderCart();
            } else if (tabName === 'profile') {
                document.getElementById('tab-btn-profile').classList.add('active');
                document.getElementById('profile-screen').classList.add('active');
            }
        }
        async function loadProducts() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;
                productsData = rows.map(row => {
                    if (!row.c || row.c.length < 3) return null;
                    return {
                        id: row.c[0] ? String(row.c[0].v || '') : '',
                        name: row.c[1] ? String(row.c[1].v || '') : '',
                        price: row.c[2] ? parseFloat(row.c[2].v || 0) : 0,
                        category: row.c[3] ? String(row.c[3].v || 'Другое') : 'Другое'
                    };
                }).filter(p => p && p.id && p.name && p.id !== 'id' && p.id !== 'null');
                document.getElementById('loader').style.display = 'none';
                if(productsData.length === 0) {
                    document.getElementById('products-container').innerHTML = `<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:30px; font-size:14px; font-weight: 500;">Виджет пуст. Заполните лист Products в таблице!</div>`;
                    return;
                }
                const categories = ['all', ...new Set(productsData.map(p => p.category))];
                renderCategories(categories); renderCatalog();
            } catch (error) {
                document.getElementById('loader').innerText = 'Ошибка подключения виджетов бэкенда.';
                console.error(error);
            }
        }
        function renderCategories(categories) {
            const container = document.getElementById('categories-list'); container.innerHTML = '';
            categories.forEach(cat => {
                const div = document.createElement('div'); div.className = `category-pill ${currentCategory === cat ? 'active' : ''}`;
                div.innerText = cat === 'all' ? 'Все' : cat; div.onclick = () => filterCategory(cat); container.appendChild(div);
            });
        }
        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-pill').forEach(el => { el.classList.toggle('active', el.innerText === (cat === 'all' ? 'Все' : cat)); });
            renderCatalog();
        }
        function renderCatalog() {
            const container = document.getElementById('products-container'); container.innerHTML = '';
            const filtered = currentCategory === 'all' ? productsData : productsData.filter(p => p.category === currentCategory);
            filtered.forEach(p => {
                const div = document.createElement('div'); div.className = 'product-card liquid-panel';
                div.innerHTML = `<div class="product-name">${p.name}</div><div class="product-footer"><div class="product-price">${p.price.toFixed(2)} Br</div><button class="add-btn" onclick="addToCart('${p.id}')"><span class="material-icons-round" style="font-size:20px;">add</span></button></div>`;
                container.appendChild(div);
            });
        }
        function addToCart(id) { cart[id] = (cart[id] || 0) + 1; updateCartBadge(); if(tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium'); }
        function updateCartBadge() { const totalItems = Object.values(cart).reduce((a, b) => a + b, 0); const badge = document.getElementById('cart-badge'); if (totalItems > 0) { badge.innerText = totalItems; badge.style.display = 'block'; } else { badge.style.display = 'none'; } }
        function changeQty(id, delta) { cart[id] = (cart[id] || 0) + delta; if (cart[id] <= 0) delete cart[id]; updateCartBadge(); renderCart(); }
        function renderCart() {
            const container = document.getElementById('cart-items-container'); container.innerHTML = ''; let total = 0; let hasItems = false;
            for (const id in cart) {
                const product = productsData.find(p => p.id === id); if (!product) continue; hasItems = true; const itemCost = product.price * cart[id]; total += itemCost;
                const div = document.createElement('div'); div.className = 'cart-item liquid-panel';
                div.innerHTML = `<div><div style="font-weight:600; font-size:15px;">${product.name}</div><div style="color:var(--text-muted); font-size:13px; margin-top:2px;">${product.price.toFixed(2)} Br</div></div><div class="cart-controls"><button class="cart-qty-btn" onclick="changeQty('${id}', -1)">-</button><span style="font-weight:600; min-width:16px; text-align:center;">${cart[id]}</span><button class="cart-qty-btn" onclick="changeQty('${id}', 1)">+</button></div>`;
                container.appendChild(div);
            }
            if (!hasItems) { container.innerHTML = `<div style="text-align:center; padding:50px; color:var(--text-muted); font-size:14px; font-weight: 500;">Корзина пуста.</div>`; document.getElementById('cart-form-block').style.display = 'none'; }
            else { document.getElementById('cart-form-block').style.display = 'block'; document.getElementById('cart-total-price').innerText = `${total.toFixed(2)} Br`; }
        }
        function sendOrder() {
            const district = document.getElementById('selected-district-text').innerText; const address = document.getElementById('user-address').value.trim();
            if (district === 'Выбрать район Сморгони...') { alert('Пожалуйста, выберите район доставки!'); return; }
            if (!address) { alert('Пожалуйста, укажите точный адрес и телефон!'); return; }
            let message = `🚀 *Новый заказ (Сморгонь)*\n\n`; let total = 0;
            for (const id in cart) { const product = productsData.find(p => p.id === id); if (product) { const cost = product.price * cart[id]; total += cost; message += `• ${product.name} x${cart[id]} — ${cost.toFixed(2)} Br\n`; } }
            message += `\n📍 *Район:* ${district}\n🏠 *Адрес/Связь:* ${address}\n\n💰 *Итого:* ${total.toFixed(2)} Br`;
            if (tg) { tg.sendData(message); } else { const encodedText = encodeURIComponent(message); window.open(`https://t.me{encodedText}`, '_blank'); }
        }
        loadProducts();
    </script>
</body>
</html>
